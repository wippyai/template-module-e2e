version: "1.0"
namespace: wippy.example.test

entries:
  - name: processes
    kind: process.host
    meta:
      comment: Process host used to run the test entrypoint
    host:
      max_processes: 1000
      workers: 8
    lifecycle:
      auto_start: true

  - name: terminal
    kind: terminal.host
    meta:
      comment: Terminal host used to exec the test runner
    lifecycle:
      auto_start: true

  - name: runner
    kind: process.lua
    meta:
      comment: Discovers and runs every entry with meta.type=test
      command:
        name: test
        short: Run module tests
        use_case: test
    source: file://runner.lua
    method: main
    modules:
      - io
      - registry
      - funcs

  - name: greeting
    kind: function.lua
    meta:
      type: test
      suite: greeting
      description: greeting.greet returns a formatted greeting
    source: file://greeting_test.lua
    method: main
    imports:
      greeting: wippy.example:greeting
